<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Bambu Color Voxelizer Web</title>
    <!-- Stlite engine sets up Streamlit without requiring a python server -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.0/build/stlite.css" />
    <style>
      [data-testid="stDeployButton"], [data-testid="stAppDeployButton"],
      .stDeployButton, .stAppDeployButton, button[title="Deploy"], [aria-label="Deploy"] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.0/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          // Your exact Python dependencies
          requirements: ["numpy", "Pillow", "opencv-python"],
          entrypoint: "app.py",
          files: {
            "app.py": { url: "app.py?v=20260522-export-format-v4" },
            // Fetches directly from your public GitHub repository
            "bambu_color_voxelizer.py": { url: "bambu_color_voxelizer.py?v=20260522-v04" },
            "InputExample.png": { url: "InputExample.png" } 
          }
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
